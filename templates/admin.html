<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — Certificate Generator</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
    <style>
        .admin-container {
            max-width: 600px;
            margin: 80px auto;
            padding: 0 24px;
        }

        .admin-card {
            padding: 40px;
        }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 0;
            border-bottom: 1px solid var(--border);
            gap: 24px;
        }

        .setting-row:last-child {
            border-bottom: none;
        }

        .setting-info h3 {
            font-size: 1.2rem;
            margin-bottom: 4px;
            color: #fff;
        }

        .setting-info p {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.4;
        }

        /* Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 28px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255, 255, 255, 0.1);
            transition: .4s;
            border-radius: 34px;
            border: 1px solid var(--border);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: var(--text-muted);
            transition: .4s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: var(--success);
            border-color: var(--success);
        }

        input:checked+.slider:before {
            transform: translateX(22px);
            background-color: #fff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }

        /* Input field */
        .admin-input {
            background: #000;
            border: 1px solid var(--border);
            color: #fff;
            padding: 12px 16px;
            border-radius: 8px;
            font-family: inherit;
            width: 100%;
            max-width: 250px;
            transition: var(--transition);
        }

        .admin-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-glow);
        }
    </style>
</head>

<body>

    <!-- Animated Background Elements -->
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-grid"></div>

    <div class="admin-container">
        <header class="app-header" style="padding-top: 0; padding-bottom: 24px;">
            <div class="badge"
                style="background: rgba(239, 68, 68, 0.2); color: #fca5a5; border-color: rgba(239, 68, 68, 0.4); box-shadow: 0 0 20px rgba(239, 68, 68, 0.2);">
                Admin Control</div>
            <h1 style="font-size: 2.5rem;">Access Management</h1>
            <p>Configure who can use the Certificate Generator</p>
        </header>

        <div class="card glass-card admin-card">

            <!-- Toggle Lock -->
            <div class="setting-row">
                <div class="setting-info">
                    <h3>🔒 Require Password</h3>
                    <p>If enabled, visitors will be prompted for a password before they can access the generator tool.
                    </p>
                </div>
                <label class="switch">
                    <input type="checkbox" id="lock-toggle">
                    <span class="slider"></span>
                </label>
            </div>

            <!-- Change Password -->
            <div class="setting-row" id="password-row" style="opacity: 0.5; pointer-events: none; transition: 0.3s;">
                <div class="setting-info">
                    <h3>🔑 Public Password</h3>
                    <p>The shared password visitors must type to enter the site.</p>
                </div>
                <input type="text" id="public-password" class="admin-input" placeholder="Enter password...">
            </div>

            <div class="btn-row" style="margin-top: 32px; justify-content: flex-end;">
                <a href="/" class="btn btn-ghost">← Back to Generator</a>
                <button class="btn btn-primary btn-glow" id="save-btn" onclick="saveSettings()">Save Changes</button>
            </div>

        </div>
    </div>

    <div id="toast" role="status"></div>

    <script>
        const lockToggle = document.getElementById('lock-toggle');
        const passInput = document.getElementById('public-password');
        const passRow = document.getElementById('password-row');

        // Load initial settings
        fetch('/api/admin12arjun/settings')
            .then(res => res.json())
            .then(data => {
                lockToggle.checked = data.is_public_locked;
                passInput.value = data.public_password;
                updateUI();
            });

        lockToggle.addEventListener('change', updateUI);

        function updateUI() {
            if (lockToggle.checked) {
                passRow.style.opacity = '1';
                passRow.style.pointerEvents = 'auto';
            } else {
                passRow.style.opacity = '0.5';
                passRow.style.pointerEvents = 'none';
            }
        }

        function saveSettings() {
            const btn = document.getElementById('save-btn');
            btn.innerText = "Saving...";

            fetch('/api/admin12arjun/settings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    is_public_locked: lockToggle.checked,
                    public_password: passInput.value
                })
            })
                .then(res => res.json())
                .then(data => {
                    btn.innerText = "Save Changes";
                    if (data.success) {
                        showToast('Settings saved successfully!', 'success');
                    } else {
                        showToast('Error saving settings.', 'error');
                    }
                })
                .catch(err => {
                    btn.innerText = "Save Changes";
                    showToast('Network error.', 'error');
                });
        }

        function showToast(msg, type) {
            const t = document.getElementById('toast');
            t.className = type + ' show';
            t.innerText = msg;
            setTimeout(() => { t.className = ''; }, 3000);
        }
    </script>
</body>

</html>
